<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Entrar &mdash; Projetos Eletricos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <form class="login-card" method="POST" action="{{ url_for('login') }}" autocomplete="on">
    <h1>Projetos Eletricos</h1>
    <p class="login-sub">Energisa &mdash; acesso restrito</p>
    {% if erro %}
    <div class="login-erro">{{ erro }}</div>
    {% endif %}
    <label class="login-label">Usuario
      <input type="text" name="usuario" autocomplete="username" required autofocus>
    </label>
    <label class="login-label">Senha
      <input type="password" name="senha" autocomplete="current-password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
