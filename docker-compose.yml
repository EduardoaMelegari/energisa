services:
  app:
    build: .
    image: energisa-projetos
    container_name: energisa-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      # cookie.txt, snapshot.json e .secret_key persistem aqui (fora da imagem).
      - ./data:/data
    # Publica a porta SOMENTE no localhost da maquina. O cloudflared (que roda
    # no host) alcanca via http://localhost:1289, mas a porta NAO fica exposta
    # na rede local nem na internet — o acesso externo e so pelo tunnel.
    ports:
      - "127.0.0.1:1289:1289"
